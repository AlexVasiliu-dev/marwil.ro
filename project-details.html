<!DOCTYPE html>
<html lang="ro" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalii Proiect | Marwil Rubeus</title>
    <link rel="icon" type="image/png" href="just%20logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .details-container { margin-top: 120px; padding-bottom: 50px; }
        .section-box { background: var(--card-bg); border-left: 5px solid var(--deep-blue); padding: 2rem; margin-bottom: 2rem; border-radius: 4px; }
        .section-title { color: var(--deep-blue); text-transform: uppercase; font-size: 1.2rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--slate); padding-bottom: 0.5rem; }
        .info-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; }
        .label { font-weight: 700; color: var(--slate); }
        .single-photo-card { width: 100%; max-width: 300px; height: 300px; object-fit: cover; border-radius: 12px; border: 1px solid var(--sky-blue); }
        @media (max-width: 576px) {
            .section-box { padding: 1.2rem; }
            .info-grid { grid-template-columns: 1fr; }
            .single-photo-card { max-width: 100%; height: 220px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="marwil-rubeus.html" class="logo">
                <img src="just%20logo.png" alt="Logo" class="logo-img">
                <img src="logo%20text.png" alt="Marwil Rubeus" class="logo-text-img">
            </a>
            <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Meniu">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links" id="nav-links">
                <a href="marwil-rubeus.html#home" data-i18n="navHome">Acasă</a>
                <a href="marwil-rubeus.html#about" data-i18n="navAbout">Despre Noi</a>
                <a href="marwil-rubeus.html#services" data-i18n="navServices">Servicii</a>
                <a href="projects.html" data-i18n="navPortfolio">Portofoliu</a>
                <a href="marwil-rubeus.html#contact" class="cta-button" data-i18n="navContact">Cere Ofertă</a>
                <div class="nav-controls">
                    <button id="lang-toggle" class="toggle-btn">EN</button>
                    <button id="theme-toggle" class="toggle-btn">🌙</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container details-container" id="project-content"></main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo"><img src="logo.png" alt="Marwil Rubeus Logo"><p data-i18n="footerText">Soluții sustenabile din 2013.</p></div>
                <div class="footer-links">
                    <div class="footer-column"><h4 data-i18n="footerNav">Companie</h4><ul><li><a href="marwil-rubeus.html#about" data-i18n="navAbout">Despre Noi</a></li><li><a href="marwil-rubeus.html#services" data-i18n="navServices">Servicii</a></li><li><a href="projects.html" data-i18n="navPortfolio">Portofoliu</a></li></ul></div>
                    <div class="footer-column"><h4 data-i18n="footerContact">Contact</h4><ul><li><a href="mailto:office@marwil.ro">office@marwil.ro</a></li><li>+40 757 955 487</li></ul></div>
                </div>
            </div>
            <div class="copyright"><p>&copy; 2026 Marwil Rubeus S.R.L. | <a href="admin.html" class="admin-link-secret">Admin Login</a></p></div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="projects.js"></script>
    <script src="translations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Mobile Menu ---
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const navLinks = document.getElementById('nav-links');
            if (mobileBtn && navLinks) {
                mobileBtn.addEventListener('click', () => {
                    navLinks.classList.toggle('open');
                    mobileBtn.classList.toggle('open');
                });
                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        navLinks.classList.remove('open');
                        mobileBtn.classList.remove('open');
                    });
                });
            }

            const html = document.documentElement;
            const savedTheme = localStorage.getItem('theme') || 'light';
            html.setAttribute('data-theme', savedTheme);
            const themeToggle = document.getElementById('theme-toggle');
            if(themeToggle) themeToggle.textContent = savedTheme === 'light' ? '🌙' : '☀️';
            if(themeToggle) themeToggle.onclick = () => {
                const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                themeToggle.textContent = newTheme === 'light' ? '🌙' : '☀️';
            };

            const langToggle = document.getElementById('lang-toggle');
            let currentLang = localStorage.getItem('lang') || 'ro';
            function updateLanguage() {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[currentLang] && translations[currentLang][key]) el.textContent = translations[currentLang][key];
                });
                if(langToggle) langToggle.textContent = currentLang === 'en' ? 'RO' : 'EN';
            }
            if(langToggle) langToggle.onclick = () => {
                currentLang = currentLang === 'en' ? 'ro' : 'en';
                localStorage.setItem('lang', currentLang);
                updateLanguage();
            };
            updateLanguage();

            const container = document.getElementById('project-content');
            const params = new URLSearchParams(window.location.search);
            container.innerHTML = '<p style="text-align:center; padding:3rem;">Se încarcă...</p>';

            getProjects().then(projects => {
                const p = projects.find(proj => proj.id == params.get('id'));
                if (!p) { container.innerHTML = '<h2>Proiect negăsit.</h2>'; return; }

                let photos = '';
                if (p.photos && p.photos.length > 0) {
                    photos = `<div class="section-box"><h3 class="section-title">Documentație Vizuală</h3>`;
                    if (p.photos.length === 1) photos += `<div style="display:flex; justify-content:center;"><img src="${p.photos[0]}" class="single-photo-card"></div>`;
                    else {
                        photos += `<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:1rem;">`;
                        p.photos.forEach(s => photos += `<img src="${s}" style="width:100%; height:250px; object-fit:cover; border-radius:8px;">`);
                        photos += `</div>`;
                    }
                    photos += `</div>`;
                }

                container.innerHTML = `
                    <div class="section-box"><h3 class="section-title">Secțiunea 1: Obiect</h3><div class="info-grid"><div class="label">Nume:</div><div>${p.name}</div><div class="label">CPV:</div><div>${p.cpv || '-'}</div><div class="label">Locație:</div><div>${p.city}</div></div></div>
                    <div class="section-box"><h3 class="section-title">Secțiunea 2: Atribuire</h3><div class="info-grid"><div class="label">Autoritate:</div><div>${p.authority}</div><div class="label">Valoare:</div><div>${p.value.toLocaleString()} RON</div><div class="label">Stare:</div><div>${p.status}</div></div><div style="margin-top:2rem;"><a href="https://e-licitatie.ro/pub/notices/ca-notices/view-c/${p.id}" target="_blank" class="secondary-cta" style="color:var(--deep-blue); border-color:var(--deep-blue);">Accesează SEAP oficial</a></div></div>
                    ${photos}`;
            });
        });
    </script>
</body>
</html>
