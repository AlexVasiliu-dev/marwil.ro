            .section-box { padding: 1.2rem; }

            .single-photo-card { max-width: 100%; height: 220px; }

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="projects.js"></script>
    <script src="translations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Mobile Menu ---
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const navLinks = document.getElementById('nav-links');
            if (mobileBtn && navLinks) {
                mobileBtn.addEventListener('click', () => {
                    navLinks.classList.toggle('open');
                    mobileBtn.classList.toggle('open');
                });
                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        navLinks.classList.remove('open');
                        mobileBtn.classList.remove('open');
                    });
                });
            }

            const html = document.documentElement;
            const savedTheme = localStorage.getItem('theme') || 'light';
            html.setAttribute('data-theme', savedTheme);
            const themeToggle = document.getElementById('theme-toggle');
            if(themeToggle) themeToggle.textContent = savedTheme === 'light' ? '🌙' : '☀️';
            if(themeToggle) themeToggle.onclick = () => {
                const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                themeToggle.textContent = newTheme === 'light' ? '🌙' : '☀️';
            };

            const langToggle = document.getElementById('lang-toggle');
            let currentLang = localStorage.getItem('lang') || 'ro';
            function updateLanguage() {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[currentLang] && translations[currentLang][key]) el.textContent = translations[currentLang][key];
                });
                if(langToggle) langToggle.textContent = currentLang === 'en' ? 'RO' : 'EN';
            }
            if(langToggle) langToggle.onclick = () => {
                currentLang = currentLang === 'en' ? 'ro' : 'en';
                localStorage.setItem('lang', currentLang);
                updateLanguage();
            };
            updateLanguage();

            const container = document.getElementById('project-content');
            const params = new URLSearchParams(window.location.search);
            container.innerHTML = `<p style="text-align:center; padding:3rem;" data-i18n="detailsLoading">Se încarcă...</p>`;

            getProjects().then(projects => {
                const p = projects.find(proj => proj.id == params.get('id'));
                if (!p) { container.innerHTML = `<h2 data-i18n="detailsNotFound">Proiect negăsit.</h2>`; updateLanguage(); return; }

                let photos = '';
                if (p.photos && p.photos.length > 0) {
                    photos = `<div class="section-box"><h3 class="section-title" data-i18n="detailsPhotos">Documentație Vizuală</h3>`;
                    if (p.photos.length === 1) photos += `<div style="display:flex; justify-content:center;"><img src="${p.photos[0]}" class="single-photo-card"></div>`;
                    else {
                        photos += `<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:1rem;">`;
                        p.photos.forEach(s => photos += `<img src="${s}" style="width:100%; height:250px; object-fit:cover; border-radius:8px;">`);
                        photos += `</div>`;
                    }
                    photos += `</div>`;
                }

                container.innerHTML = `
                    <div class="section-box"><h3 class="section-title" data-i18n="detailsSection1">Secțiunea 1: Obiect</h3><div class="info-grid"><div class="label" data-i18n="detailsLabelName">Nume:</div><div>${p.name}</div><div class="label" data-i18n="detailsLabelCPV">CPV:</div><div>${p.cpv || '-'}</div><div class="label" data-i18n="detailsLabelCity">Locație:</div><div>${p.city}</div></div></div>
                    <div class="section-box"><h3 class="section-title" data-i18n="detailsSection2">Secțiunea 2: Atribuire</h3><div class="info-grid"><div class="label" data-i18n="detailsLabelAuthority">Autoritate:</div><div>${p.authority}</div><div class="label" data-i18n="detailsLabelValue">Valoare:</div><div>${p.value.toLocaleString()} RON</div><div class="label" data-i18n="detailsLabelStatus">Stare:</div><div>${p.status}</div></div><div style="margin-top:2rem;"><a href="https://e-licitatie.ro/pub/notices/ca-notices/view-c/${p.id}" target="_blank" class="secondary-cta" style="color:var(--deep-blue); border-color:var(--deep-blue);" data-i18n="detailsSeapLink">Accesează SEAP oficial</a></div></div>
                    ${photos}`;
                updateLanguage();
            });
        });
    </script>
