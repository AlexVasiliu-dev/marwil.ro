<!DOCTYPE html>
<html lang="ro" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAdmin | Marwil Rubeus</title>
    <link rel="icon" type="image/png" href="just%20logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        #superadmin-content { display: none; padding: 50px 0; }
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: #fff; padding: 3rem; border-radius: 8px; width: 100%; max-width: 400px; text-align: center;
        }
        .login-box input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body style="background: #f4f7f6;">
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h2>SuperAdmin Access</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Superuser" required>
                <input type="password" id="password" placeholder="Master Password" required>
                <button type="submit" class="primary-cta" style="width: 100%; border: none;">Login</button>
                <p id="login-error" style="color: red; margin-top: 1rem; display: none;">Invalid master credentials.</p>
            </form>
        </div>
    </div>

    <div id="superadmin-content" class="container">
        <div class="section-box" style="max-width: 600px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <h2 style="color: var(--deep-blue); margin-bottom: 2rem;">Admin Password Reset</h2>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label>Current Admin Password:</label>
                <div id="current-pass" style="font-family: monospace; background: #eee; padding: 0.5rem; margin-top: 0.5rem;"></div>
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label>New Admin Password:</label>
                <input type="text" id="new-pass" style="width: 100%; padding: 0.8rem; border: 1px solid var(--slate); border-radius: 4px; margin-top: 0.5rem;">
            </div>
            <button id="reset-btn" class="primary-cta" style="width: 100%; border: none;">Save New Password</button>
            <div style="margin-top: 2rem; text-align: center;">
                <a href="marwil-rubeus.html" style="color: var(--slate); text-decoration: none;">Exit to Site</a>
            </div>
        </div>
    </div>

    <script src="projects.js?v=20"></script>
    <script>
        const loginForm = document.getElementById('login-form');
        const loginOverlay = document.getElementById('login-overlay');
        const content = document.getElementById('superadmin-content');
        const loginError = document.getElementById('login-error');

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            if (document.getElementById('username').value === 'superadmin' && 
                document.getElementById('password').value === 'Rubeus2025%') {
                loginOverlay.style.display = 'none';
                content.style.display = 'block';
                document.getElementById('current-pass').textContent = getAdminPass();
            } else {
                loginError.style.display = 'block';
            }
        };

        document.getElementById('reset-btn').onclick = () => {
            const val = document.getElementById('new-pass').value;
            if (val.length < 4) return alert("Password too short.");
            setAdminPass(val);
            document.getElementById('current-pass').textContent = val;
            alert("Admin password updated successfully.");
        };
    </script>
</body>
</html>
