<!DOCTYPE html>
<html lang="ro" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Marwil Rubeus</title>
    <link rel="icon" type="image/png" href="just%20logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        #photo-manager { display: none; grid-column: span 2; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--deep-blue-dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--bg-color); padding: 3rem; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; }
        #admin-content { display: none; }
    </style>
</head>
<body>
    <div id="login-overlay" class="login-overlay"><div class="login-box"><h2>Autentificare Admin</h2><form id="login-form"><input type="text" id="username" placeholder="Utilizator" style="width:100%; margin-bottom:1rem; padding:0.8rem;" required><input type="password" id="password" placeholder="Parolă" style="width:100%; margin-bottom:1rem; padding:0.8rem;" required><button type="submit" class="primary-cta" style="width: 100%; border: none;">Conectare</button><p id="login-error" style="color: red; margin-top: 1rem; display: none;">Date incorecte!</p></form></div></div>

    <div id="admin-content">
        <nav class="navbar"><div class="container"><a href="marwil-rubeus.html" class="logo"><img src="just%20logo.png" class="logo-img"><img src="logo%20text.png" class="logo-text-img"></a><div class="nav-links"><button id="theme-toggle" class="toggle-btn">🌙</button><button id="logout-btn" class="toggle-btn">Ieșire</button></div></div></nav>

        <div class="container admin-container" style="margin-top: 120px;">
            <h3>Proiecte</h3>
            <form id="project-form" class="admin-form">
                <input type="hidden" id="project-id">
                <div class="form-group"><label>Titlu</label><input type="text" id="project-title" required></div>
                <div class="form-group"><label>Autoritate</label><input type="text" id="project-contractor" required></div>
                <div class="form-group"><label>Buget</label><input type="number" id="project-budget" required></div>
                <div class="form-group"><label>Cod CPV</label><input type="text" id="project-cpv"></div>
                <div class="form-group"><label>Imagine Principală (Cale)</label><input type="text" id="project-image" placeholder="screens/nume.png"></div>
                <div id="photo-manager" style="display:block;"><label>Galerie Foto (URL-uri pe linie)</label><textarea id="project-photos" rows="5"></textarea></div>
                <button type="submit" class="primary-cta" style="grid-column: span 2; border:none;">Salvează Proiect</button>
            </form>
            <table class="admin-table"><thead><tr><th>Titlu</th><th>Acțiuni</th></tr></thead><tbody id="admin-projects-list"></tbody></table>
        </div>

        <footer class="footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-logo"><img src="logo.png" alt="Marwil Rubeus Logo"><p>Soluții sustenabile din 2013.</p></div>
                    <div class="footer-links">
                        <div class="footer-column"><h4>Companie</h4><ul><li><a href="marwil-rubeus.html#about">Despre Noi</a></li><li><a href="marwil-rubeus.html#services">Servicii</a></li><li><a href="projects.html">Portofoliu</a></li></ul></div>
                        <div class="footer-column"><h4>Contact</h4><ul><li><a href="mailto:office@marwil.ro">office@marwil.ro</a></li><li>+40 757 955 487</li></ul></div>
                    </div>
                </div>
                <div class="copyright"><p>&copy; 2026 Marwil Rubeus S.R.L. | <a href="admin.html" class="admin-link-secret">Admin Login</a></p></div>
            </div>
        </footer>
    </div>

    <script src="projects.js?v=21"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginOverlay = document.getElementById('login-overlay');
            const adminContent = document.getElementById('admin-content');
            if (sessionStorage.getItem('admin_logged_in') === 'true') { loginOverlay.style.display = 'none'; adminContent.style.display = 'block'; }

            document.getElementById('login-form').onsubmit = (e) => {
                e.preventDefault();
                if (document.getElementById('username').value === 'Marius' && document.getElementById('password').value === getAdminPass()) {
                    sessionStorage.setItem('admin_logged_in', 'true');
                    location.reload();
                } else { document.getElementById('login-error').style.display = 'block'; }
            };

            const html = document.documentElement;
            html.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
            document.getElementById('theme-toggle').onclick = () => {
                const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            };

            const list = document.getElementById('admin-projects-list');
            function load() {
                list.innerHTML = '';
                getProjects().forEach(p => {
                    list.innerHTML += `<tr><td>${p.name}</td><td><button onclick="edit(${p.id})">Edit</button></td></tr>`;
                });
            }
            window.edit = (id) => {
                const p = getProjects().find(x => x.id == id);
                document.getElementById('project-id').value = p.id;
                document.getElementById('project-title').value = p.name;
                document.getElementById('project-contractor').value = p.authority;
                document.getElementById('project-budget').value = p.value;
                document.getElementById('project-cpv').value = p.cpv || '';
                document.getElementById('project-image').value = p.image || '';
                document.getElementById('project-photos').value = (p.photos || []).join('\n');
            };
            document.getElementById('project-form').onsubmit = (e) => {
                e.preventDefault();
                const p = {
                    id: parseInt(document.getElementById('project-id').value),
                    name: document.getElementById('project-title').value,
                    authority: document.getElementById('project-contractor').value,
                    value: parseFloat(document.getElementById('project-budget').value),
                    cpv: document.getElementById('project-cpv').value,
                    image: document.getElementById('project-image').value,
                    photos: document.getElementById('project-photos').value.split('\n').filter(x => x.trim()),
                    date: new Date().toISOString(), status: 'Atribuita', project_type: 'Lucrari', city: 'Galați'
                };
                saveProject(p);
                load();
                alert("Salvat!");
            };
            if (sessionStorage.getItem('admin_logged_in') === 'true') load();
        });
    </script>
</body>
</html>
